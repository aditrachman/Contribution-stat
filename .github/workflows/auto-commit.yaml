name: Auto Commit Daily

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 0,2,5,8,11,13 * * *"

  workflow_dispatch:

jobs:
  auto_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Commit changes
        run: |
          git config --local user.email "aditrachman23@gmail.com"
          git config --local user.name "aditrachman"

          arr[0]="chore(bot): 😂 auto commit"
          arr[1]="chore(bot): 😱 auto commit"
          arr[2]="chore(bot): 👿 auto commit"
          arr[3]="chore(bot): 💩 auto commit"
          arr[4]="chore(bot): 🙏 auto commit"
          arr[5]="chore(bot): 🙈 auto commit"
          arr[6]="chore(bot): 🐐 auto commit"
          arr[7]="chore(bot): 🤖 auto commit"
          arr[8]="chore(bot): 🟩 auto commit"
          arr[9]="chore(bot): 👻 auto commit"
          arr[10]="feat: update project"
          arr[11]="fix: minor bug fix"
          arr[12]="docs: update readme"
          arr[13]="refactor: clean up code"
          arr[14]="chore: maintenance"

          # Setiap run buat 1-2 commit (6 run/hari = 6-12 commit/hari)
          num=$((RANDOM % 2 + 1))

          for i in $(seq 1 $num); do
            d=$(date '+%Y-%m-%dT%H:%M:%SZ')
            echo "$d" > LAST_UPDATED
            git add -A
            rand=$((RANDOM % ${#arr[@]}))
            git commit -m "${arr[$rand]}"
            sleep 1
          done

      - name: Push changes
        run: git push origin main