name: Auto Commit Daily

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 0,2,5,8,11,13 * * *"

  workflow_dispatch:

jobs:
  auto_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update timestamp file
        run: |
          d=$(date '+%Y-%m-%dT%H:%M:%SZ')
          echo "$d" > LAST_UPDATED

      - name: Commit changes
        run: |
          git config --local user.email "aditrachman23@gmail.com"
          git config --local user.name "aditrachman"
          git add -A

          arr[0]="chore(bot): 😂 auto commit"
          arr[1]="chore(bot): 😱 auto commit"
          arr[2]="chore(bot): 👿 auto commit"
          arr[3]="chore(bot): 💩 auto commit"
          arr[4]="chore(bot): 🙏 auto commit"
          arr[5]="chore(bot): 🙈 auto commit"
          arr[6]="chore(bot): 🐐 auto commit"
          arr[7]="chore(bot): 🤖 auto commit"
          arr[8]="chore(bot): 🟩 auto commit"
          arr[9]="chore(bot): 👻 auto commit"

          rand=$[$RANDOM % ${#arr[@]}]
          git diff --cached --quiet || git commit -m "${arr[$rand]}"

      - name: Push changes
        run: git push origin main